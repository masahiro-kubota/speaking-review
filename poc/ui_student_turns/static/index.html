<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Speech Review UI</title>
    <link rel="stylesheet" href="/student-turn-static/styles.css?v=8" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div>
          <p class="eyebrow">PoC UI</p>
          <h1>Student Speech Review</h1>
          <p class="hero-copy">
            `poc/output/&lt;lesson&gt;/merged.student_exchanges.json` を見ながら、teacher prompt と student response の exchange 単位で添削結果を確認するための最小 UI。
          </p>
        </div>
        <div class="picker">
          <label for="lesson-select">Lesson</label>
          <div class="picker-row">
            <select id="lesson-select"></select>
            <button id="load-button" type="button">Load</button>
          </div>
        </div>
      </section>

      <section class="meta">
        <div class="meta-card">
          <span class="meta-label">Audio</span>
          <strong id="audio-file-name">-</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label" id="item-count-label">Exchanges</span>
          <strong id="item-count">0</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label">Student Labels</span>
          <strong id="student-speakers">-</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label">Teacher Labels</span>
          <strong id="teacher-speakers">-</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label">Reviews</span>
          <strong id="review-summary">-</strong>
        </div>
      </section>

      <section class="player-panel">
        <audio id="audio-player" controls preload="metadata"></audio>
      </section>

      <section id="turn-list" class="turn-list">
        <article class="empty-card">Lesson を選んでください。</article>
      </section>
    </main>

    <script src="/student-turn-static/app.js?v=8" defer></script>
  </body>
</html>
