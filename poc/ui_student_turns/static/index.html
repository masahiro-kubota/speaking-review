<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Turn Review UI</title>
    <link rel="stylesheet" href="/student-turn-static/styles.css?v=4" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div>
          <p class="eyebrow">PoC UI</p>
          <h1>Student Turn Review</h1>
          <p class="hero-copy">
            生徒の発話を turn 単位で見ながら、直前の prompt と返答をまとめて確認するための最小 UI。
          </p>
        </div>
        <div class="picker">
          <label for="unit-select">Unit</label>
          <div class="picker-row single-row">
            <select id="unit-select">
              <option value="turn">Turn</option>
              <option value="utterance">Utterance</option>
            </select>
          </div>
          <label for="turns-select">Student Speech</label>
          <div class="picker-row">
            <select id="turns-select"></select>
            <button id="load-button" type="button">Load</button>
          </div>
        </div>
      </section>

      <section class="meta">
        <div class="meta-card">
          <span class="meta-label">Audio</span>
          <strong id="audio-file-name">-</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label" id="item-count-label">Turns</span>
          <strong id="item-count">0</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label">Student Labels</span>
          <strong id="student-speakers">-</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label">Teacher Labels</span>
          <strong id="teacher-speakers">-</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label">Reviews</span>
          <strong id="review-summary">-</strong>
        </div>
      </section>

      <section class="player-panel">
        <audio id="audio-player" controls preload="metadata"></audio>
      </section>

      <section id="turn-list" class="turn-list">
        <article class="empty-card">Student turns を選んでください。</article>
      </section>
    </main>

    <script src="/student-turn-static/app.js?v=4" defer></script>
  </body>
</html>
